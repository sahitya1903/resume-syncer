name: Overleaf Resume Syncer
description: Syncs resume.pdf and resume.tex from Overleaf to GitHub, with optional Google Drive and external repository upload.
author: sahitya1903

inputs:
  overleaf_url:
    required: true
    description: Read-url from overleaf
  github_token:
    required: true
    description: GitHub token for authentication
  gdrive_link:
    description: Google drive link with edit permission
  gdrive_service_account_key:
    description: Service account JSON key string for Google Drive access
    required: false
  portfolio_repo:
    description: Target portfolio repository (e.g., username/repo)
    required: false
  portfolio_token:
    description: GitHub Personal Access Token (PAT) with write access to target repository
    required: false

runs:
  using: 'composite'
  steps:
    - name: Checkout repo
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x

    - name: Install dependencies
      run: pip install -r "${{ github.action_path }}/requirements.txt"
      shell: bash

    - name: Run Selenium script
      id: script
      run: python "${GITHUB_ACTION_PATH}/selenium_script.py" "${{ inputs.overleaf_url }}"
      shell: bash

    - name: Commit the PDF file
      id: set-output
      if: steps.script.outputs.skip != 'True'
      run: |
        # 1. Temporarily back up the newly compiled Overleaf resume files
        cp resume.pdf temp_resume.pdf
        cp resume.tex temp_resume.tex

        # 2. Determine target branch dynamically (fallback to main)
        BRANCH_NAME="${GITHUB_REF_NAME}"
        if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "HEAD" ]; then
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
        fi

        # 3. Reset the local repository to match the latest remote commit on that branch
        git fetch origin "$BRANCH_NAME"
        git reset --hard FETCH_HEAD

        # 4. Restore the new Overleaf files (overwriting the older versions)
        mv temp_resume.pdf resume.pdf
        mv temp_resume.tex resume.tex

        # 5. Configure Git and commit the changes
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

        git add -f resume.tex resume.pdf
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Resume updated"
          git push origin "HEAD:$BRANCH_NAME"
        fi
      env:
        GITHUB_TOKEN: '${{ inputs.github_token }}'
      shell: bash

    - name: Upload to google drive
      if: ${{ inputs.gdrive_link != '' && inputs.gdrive_service_account_key != '' && steps.script.outputs.skip != 'True'}}
      run: python "${GITHUB_ACTION_PATH}/upload_to_gdrive.py"
      env:
        GDRIVE_LINK: ${{ inputs.gdrive_link }}
        GDRIVE_SERVICE_ACCOUNT_KEY: ${{ inputs.gdrive_service_account_key }}
      shell: bash

    - name: Push resume.pdf to portfolio repository
      if: ${{ inputs.portfolio_repo != '' && inputs.portfolio_token != '' && steps.script.outputs.skip != 'True' }}
      run: |
        # Clone the target portfolio repository
        git clone "https://x-access-token:${{ inputs.portfolio_token }}@github.com/${{ inputs.portfolio_repo }}.git" temp_portfolio

        # Copy the updated resume.pdf to public/resume.pdf in the portfolio repository
        mkdir -p temp_portfolio/public
        cp resume.pdf temp_portfolio/public/resume.pdf

        # Commit and push changes if any
        cd temp_portfolio
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add public/resume.pdf

        if git diff --cached --quiet; then
          echo "No changes in public/resume.pdf for portfolio repository."
        else
          git commit -m "Updated resume from Overleaf"
          git push origin HEAD
        fi
      shell: bash

branding:
  icon: 'aperture'
  color: 'green'
